name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  BACKEND_SERVICE: learning-tracker-backend
  FRONTEND_SERVICE: learning-tracker-frontend
  REGISTRY: gcr.io

jobs:
  # ──────────────────────────────────────────────
  # 1. Deploy Backend
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push backend image
        run: |
          docker build -t $REGISTRY/$PROJECT_ID/$BACKEND_SERVICE:$GITHUB_SHA ./backend
          docker push $REGISTRY/$PROJECT_ID/$BACKEND_SERVICE:$GITHUB_SHA

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $REGISTRY/$PROJECT_ID/$BACKEND_SERVICE:$GITHUB_SHA \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars "SECRET_KEY=${{ secrets.SECRET_KEY }},ALGORITHM=HS256,ACCESS_TOKEN_EXPIRE_MINUTES=60" \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --set-env-vars "REDIS_URL=${{ secrets.REDIS_URL }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE \
            --platform managed \
            --region $REGION \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

  # ──────────────────────────────────────────────
  # 2. Deploy Frontend
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Get backend URL for build arg
        id: backend-url
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE \
            --platform managed \
            --region $REGION \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }} \
            -t $REGISTRY/$PROJECT_ID/$FRONTEND_SERVICE:$GITHUB_SHA \
            ./frontend
          docker push $REGISTRY/$PROJECT_ID/$FRONTEND_SERVICE:$GITHUB_SHA

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $REGISTRY/$PROJECT_ID/$FRONTEND_SERVICE:$GITHUB_SHA \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5

      - name: Print frontend URL
        run: |
          URL=$(gcloud run services describe $FRONTEND_SERVICE \
            --platform managed \
            --region $REGION \
            --format 'value(status.url)')
          echo "🚀 Frontend live at: $URL"
